<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <script>
      ;(function () {
        var root = document.documentElement
        try {
          var theme = window.localStorage.getItem('tp-theme')
          if (theme === 'genart') {
            root.setAttribute('data-theme', 'genart')
            root.style.colorScheme = 'dark'
            root.style.background = '#07080d'
            return
          }
        } catch (error) {
          root.style.background = '#ffffff'
        }
        root.removeAttribute('data-theme')
        root.style.colorScheme = 'light'
        root.style.background = '#ffffff'
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <title>Aisight</title>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
